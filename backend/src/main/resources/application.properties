spring.application.name=backend

# Database Configuration (H2 - File-based persistent storage)
spring.datasource.url=jdbc:h2:file:./data/bimdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true

# H2 Console (optional - useful for debugging)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# File Upload Configuration
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=500MB

# File Storage Path
app.upload.dir=uploads/

# Server Configuration
server.port=8080

# JWT Configuration
jwt.secret=bim-drawing-app-secret-key-change-this-in-production-minimum-256-bits-required
jwt.expiration=86400000

# CORS Configuration
cors.allowed-origins=http://localhost:5173,http://localhost:5174,http://localhost:5175
