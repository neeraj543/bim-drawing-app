services:
  # Backend Service (Spring Boot)
  - type: web
    name: bim-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: DATABASE_URL
        fromDatabase:
          name: bim-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        value: https://bim-frontend.onrender.com
    disk:
      name: uploads
      mountPath: /app/uploads
      sizeGB: 10

  # Frontend Service (React/Vite)
  - type: web
    name: bim-frontend
    runtime: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: ./frontend/dist
    envVars:
      - key: VITE_API_URL
        value: https://bim-backend.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

# Database
databases:
  - name: bim-db
    databaseName: bim_drawing_db
    user: bim_user
    plan: starter