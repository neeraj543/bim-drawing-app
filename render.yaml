services:
  # Backend Service (Spring Boot)
  - type: web
    name: bim-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: DB_HOST
        fromDatabase:
          name: bim-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: bim-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: bim-db
          property: database
      - key: DB_USER
        fromDatabase:
          name: bim-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: bim-db
          property: password
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        value: https://bim-frontend.onrender.com

  # Frontend Service (React/Vite)
  - type: web
    name: bim-frontend
    runtime: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: ./frontend/dist
    envVars:
      - key: VITE_API_URL
        value: https://bim-backend.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

# Database
databases:
  - name: bim-db
    databaseName: bim_drawing_db
    user: bim_user
    plan: free